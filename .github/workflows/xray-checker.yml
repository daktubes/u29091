name: Run xray-checker

on:
  workflow_dispatch:
    inputs:
      args:
        description: "Arguments for xray-checker"
        required: true
        default: "--help"
  schedule:
    - cron: "0/30 * * * *" 

jobs:
  run-xray-checker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get latest release info
        id: latest-release
        run: |
          LATEST_URL=$(curl -s https://api.github.com/repos/kutovoys/xray-checker/releases/latest | grep "browser_download_url.*linux-amd64.tar.gz" | cut -d '"' -f 4)
          echo "download_url=$LATEST_URL" >> $GITHUB_OUTPUT
          echo "archive_name=$(basename $LATEST_URL)" >> $GITHUB_OUTPUT

      - name: Create work directory
        run: mkdir -p xray-checker

      - name: Download and setup xray-checker
        working-directory: xray-checker
        run: |
          wget ${{ steps.latest-release.outputs.download_url }}
          tar xzf ${{ steps.latest-release.outputs.archive_name }}
          chmod +x xray-checker

      - name: Run xray-checker
        working-directory: xray-checker
        env:
          INSTANCE: ${{ secrets.INSTANCE || 'github-actions' }}
        run: |
          ./xray-checker \
            --subscription-url=https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-CIDR-RU-all.txt \
            --subscription-url=https://raw.githubusercontent.com/zieng2/wl/main/vless_universal.txt \
            --subscription-url=https://raw.githubusercontent.com/EtoNeYaProject/etoneyaproject.github.io/refs/heads/main/whitelist \
            --subscription-url=https://wlrus.lol/confs/selected.txt \
            --metrics-push-url=http://150.241.65.18:9091/metrics/job/github-actions \
            --metrics-instance=github-actions \
            --run-once

      - name: Get working VLESS keys
        id: get-vless
        run: |
          # 1. Получаем метрики только для job=github-actions
          curl -s http://150.241.65.18:9091/metrics/job/github-actions > metrics.txt
          
          # 2. Извлекаем названия рабочих прокси (value=1)
          mkdir -p checked
          grep 'xray_checker_proxy_up{.*} 1$' metrics.txt | \
          sed 's/.*name="\([^"]*\)".*}/\1/' | \
          while read name; do
            echo "$name" >> checked/working_names.txt
          done
          
          # 3. Скачиваем все ключи и декодируем base64
          curl -s https://subrostunnel.vercel.app/obsh.txt | base64 -d > all_keys.txt
          
          # 4. URL encode имён для поиска в VLESS ссылках
          awk '{
            gsub(/%/, "%25", $0)
            gsub(/\//, "%2F", $0) 
            gsub(/\?/, "%3F", $0)
            gsub(/=/, "%3D", $0)
            gsub(/&/, "%26", $0)
            print $0
          }' checked/working_names.txt > checked/url_encoded_names.txt
          
          # 5. Ищем совпадения и извлекаем VLESS ссылки
          while read encoded_name; do
            grep -m1 "$encoded_name" all_keys.txt
          done < checked/url_encoded_names.txt > checked/working_vless.txt
          
          echo "Working VLESS keys saved to checked/working_vless.txt"
          cat checked/working_vless.txt

      - name: Commit Results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Auto-update working VLESS [${{ github.run_id }}]"
          file_pattern: "checked/*"
